            measurementId: "G-81M071PSVS"

        try {
            const app = initializeApp(firebaseConfig);

              let attempts = 0;
              const checkInterval = setInterval(async () => {
                attempts++;

                  clearInterval(checkInterval);
                  try {
                    const fetchPromise = window.firebaseGetDocs(window.firebaseCollection(window.db, "auto"));

                        setTimeout(() => reject(new Error("Timeout Ambiente Protetto")), 4000);
                    });

                    const querySnapshot = await Promise.race([fetchPromise, timeoutPromise]);
                    
                    const cars = [];
                    querySnapshot.forEach((doc) => {
                      cars.push({ id: doc.id, ...doc.data() });
                    });
                    
                    if(cars.length > 0) {
                        setCarsData(cars);
                    } else {
                        console.log("Database vuoto, uso auto di prova.");
                        setCarsData(fallbackCars);
                    }

                  } catch (e) {
                    console.log("Carico il fallback a causa di limitazioni di rete.");
                    setCarsData(fallbackCars);
                    setIsLoading(false);
                  }

                  setCarsData(fallbackCars);
                  setIsLoading(false);
