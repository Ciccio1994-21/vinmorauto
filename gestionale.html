<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale VINMORAUTO | Controllo Piazzale</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000000; color: white; margin: 0; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus, textarea:focus { border-color: #eab308 !important; outline: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .img-card:first-child { border: 2px solid #eab308; }
        .img-card .cover-badge { background: #eab308; color: black; }
    </style>
</head>
<body class="custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
            authDomain: "maxcar-7416d.firebaseapp.com",
            projectId: "maxcar-7416d",
            storageBucket: "maxcar-7416d.firebasestorage.app",
            messagingSenderId: "279232212865",
            appId: "1:279232212865:web:cc951666c63af8b8bb4280",
            measurementId: "G-81M071PSVS"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const COLLECTION_PATH = `auto`;

        const App = () => {
            const [autoList, setAutoList] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            const initialForm = {
                brand: '', model: '', price: '', year: '', mileage: '', 
                fuel: 'Diesel', transmission: 'Automatico', category: 'Vendita', description: '', 
                images: [], power: '', displacement: '', color: ''
            };
            
            const [newCar, setNewCar] = useState(initialForm);

            useEffect(() => {
                const init = async () => {
                    await auth.signInAnonymously();
                    db.collection(COLLECTION_PATH).orderBy('createdAt', 'desc').onSnapshot(snap => {
                        setAutoList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
                    });
                };
                init();
            }, []);

            const handleFile = (e) => {
                const files = Array.from(e.target.files);
                const remainingSlots = 5 - newCar.images.length;
                const filesToProcess = files.slice(0, remainingSlots);

                filesToProcess.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const MAX_SIZE = 800; 

                            if (width > MAX_SIZE || height > MAX_SIZE) {
                                if (width > height) {
                                    height *= MAX_SIZE / width;
                                    width = MAX_SIZE;
                                } else {
                                    width *= MAX_SIZE / height;
                                    height = MAX_SIZE;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

                            setNewCar(prev => ({
                                ...prev,
                                images: [...prev.images, dataUrl].slice(0, 5)
                            }));
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = ""; 
            };

            const moveImage = (index, direction) => {
                const newImgs = [...newCar.images];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newImgs.length) return;
                
                [newImgs[index], newImgs[targetIndex]] = [newImgs[targetIndex], newImgs[index]];
                setNewCar(prev => ({ ...prev, images: newImgs }));
            };

            const removeImage = (index) => {
                setNewCar(prev => ({
                    ...prev,
                    images: prev.images.filter((_, i) => i !== index)
                }));
            };

            const startEdit = (car) => {
                setEditingId(car.id);
                setNewCar({
                    brand: car.brand || '',
                    model: car.model || '',
                    price: car.price ? String(car.price).replace(/[^0-9]/g, '') : '',
                    year: car.year || '',
                    mileage: car.mileage ? String(car.mileage).replace(/[^0-9]/g, '') : '',
                    fuel: car.fuel || 'Diesel',
                    transmission: car.transmission || 'Automatico',
                    category: car.category || 'Vendita',
                    description: car.description || '',
                    power: car.power ? String(car.power).replace(/[^0-9]/g, '') : '',
                    displacement: car.displacement ? String(car.displacement).replace(/[^0-9]/g, '') : '',
                    color: car.color || '',
                    images: car.images || []
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setEditingId(null);
                setNewCar(initialForm);
            };

            const saveCar = async (e) => {
                e.preventDefault();
                if (newCar.images.length === 0) return alert("Inserisci almeno una foto!");
                
                setIsSubmitting(true);
                try {
                    const payload = {
                        brand: newCar.brand,
                        model: newCar.model,
                        price: newCar.category === 'Noleggio' ? `€ ${newCar.price} / mese` : `€ ${Number(newCar.price).toLocaleString()}`,
                        year: newCar.year,
                        mileage: newCar.mileage ? `${Number(newCar.mileage).toLocaleString()} km` : '-',
                        fuel: newCar.fuel,
                        transmission: newCar.transmission,
                        category: newCar.category,
                        description: newCar.description,
                        power: newCar.power ? `${newCar.power} CV` : '',
                        displacement: newCar.displacement ? `${newCar.displacement} cm³` : '',
                        color: newCar.color || '',
                        images: newCar.images,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    if (editingId) {
                        await db.collection(COLLECTION_PATH).doc(editingId).update(payload);
                        alert("Annuncio aggiornato!");
                    } else {
                        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection(COLLECTION_PATH).add(payload);
                        alert("Auto pubblicata!");
                    }
                    
                    cancelEdit();
                } catch (error) {
                    console.error(error);
                    alert("Errore durante il salvataggio.");
                }
                setIsSubmitting(false);
            };

            const deleteCar = async (id) => {
                if(confirm("Eliminare definitivamente questo annuncio?")) {
                    await db.collection(COLLECTION_PATH).doc(id).delete();
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-[#eab308] p-3 rounded-2xl shadow-lg shadow-[#eab308]/20 text-black">
                                <i data-lucide="layout-dashboard" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tighter italic">Gestionale <span className="text-[#eab308]">VINMORAUTO</span></h1>
                                <p className="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Controllo Stock Piazzale • Import Francoforte</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Form di inserimento/modifica */}
                        <div className="lg:col-span-1">
                            <form onSubmit={saveCar} className="glass p-6 rounded-[2rem] sticky top-8 border-white/10">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-bold flex items-center gap-2 uppercase tracking-tight">
                                        <i data-lucide={editingId ? "edit" : "plus-circle"} className="w-5 h-5 text-[#eab308]"></i> 
                                        {editingId ? 'Modifica Veicolo' : 'Nuovo Veicolo'}
                                    </h2>
                                    {editingId && (
                                        <button type="button" onClick={cancelEdit} className="text-[10px] font-bold uppercase text-slate-400 hover:text-white">Annulla</button>
                                    )}
                                </div>

                                <div className="space-y-4">
                                    <div className="grid grid-cols-3 gap-2">
                                        {newCar.images.map((img, idx) => (
                                            <div key={idx} className="img-card relative aspect-square rounded-xl overflow-hidden border border-white/10 bg-slate-900 group">
                                                <img src={img} className="w-full h-full object-cover" />
                                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-between p-1">
                                                    <div className="flex justify-between">
                                                        <button type="button" onClick={() => moveImage(idx, -1)} className="bg-white/20 hover:bg-white/40 p-1 rounded backdrop-blur-md">
                                                            <i data-lucide="chevron-left" className="w-3 h-3 text-white"></i>
                                                        </button>
                                                        <button type="button" onClick={() => removeImage(idx)} className="bg-red-600 hover:bg-red-700 p-1 rounded">
                                                            <i data-lucide="x" className="w-3 h-3 text-white"></i>
                                                        </button>
                                                        <button type="button" onClick={() => moveImage(idx, 1)} className="bg-white/20 hover:bg-white/40 p-1 rounded backdrop-blur-md">
                                                            <i data-lucide="chevron-right" className="w-3 h-3 text-white"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                                {idx === 0 && <div className="cover-badge absolute bottom-0 left-0 right-0 text-[8px] text-center font-bold uppercase py-0.5">Copertina</div>}
                                            </div>
                                        ))}
                                        
                                        {newCar.images.length < 5 && (
                                            <label className="flex flex-col items-center justify-center aspect-square rounded-xl border-2 border-dashed border-white/10 bg-white/5 hover:bg-white/10 cursor-pointer transition">
                                                <i data-lucide="plus" className="w-6 h-6 mb-1 opacity-20"></i>
                                                <span className="text-[8px] font-bold uppercase opacity-40">Foto</span>
                                                <input type="file" className="hidden" accept="image/*" multiple onChange={handleFile} />
                                            </label>
                                        )}
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3 mb-2">
                                        <label className={`p-3 rounded-xl text-sm border cursor-pointer text-center font-bold uppercase tracking-widest transition-colors ${newCar.category === 'Vendita' ? 'bg-[#eab308] text-black border-[#eab308]' : 'border-white/10 text-white/50 hover:bg-white/5'}`}>
                                            <input type="radio" name="category" className="hidden" checked={newCar.category === 'Vendita'} onChange={() => setNewCar({...newCar, category: 'Vendita'})} />
                                            Vendita
                                        </label>
                                        <label className={`p-3 rounded-xl text-sm border cursor-pointer text-center font-bold uppercase tracking-widest transition-colors ${newCar.category === 'Noleggio' ? 'bg-[#eab308] text-black border-[#eab308]' : 'border-white/10 text-white/50 hover:bg-white/5'}`}>
                                            <input type="radio" name="category" className="hidden" checked={newCar.category === 'Noleggio'} onChange={() => setNewCar({...newCar, category: 'Noleggio'})} />
                                            Noleggio
                                        </label>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <input required placeholder="Marca (es. Audi)" className="p-3 rounded-xl text-sm" value={newCar.brand} onChange={e => setNewCar({...newCar, brand: e.target.value})} />
                                        <input required placeholder="Modello" className="p-3 rounded-xl text-sm" value={newCar.model} onChange={e => setNewCar({...newCar, model: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        <input required type="number" placeholder="Prezzo/Rata (€)" className="p-3 rounded-xl text-sm" value={newCar.price} onChange={e => setNewCar({...newCar, price: e.target.value})} />
                                        <input required type="number" placeholder="Anno" className="p-3 rounded-xl text-sm" value={newCar.year} onChange={e => setNewCar({...newCar, year: e.target.value})} />
                                        <input type="number" placeholder="KM" className="p-3 rounded-xl text-sm" value={newCar.mileage} onChange={e => setNewCar({...newCar, mileage: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        <input type="number" placeholder="Potenza (CV)" className="p-3 rounded-xl text-sm" value={newCar.power} onChange={e => setNewCar({...newCar, power: e.target.value})} />
                                        <input type="number" placeholder="Cilindrata (cc)" className="p-3 rounded-xl text-sm" value={newCar.displacement} onChange={e => setNewCar({...newCar, displacement: e.target.value})} />
                                        <input placeholder="Colore" className="p-3 rounded-xl text-sm" value={newCar.color} onChange={e => setNewCar({...newCar, color: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="p-3 rounded-xl text-sm" value={newCar.fuel} onChange={e => setNewCar({...newCar, fuel: e.target.value})}>
                                            <option>Diesel</option>
                                            <option>Benzina</option>
                                            <option>Ibrida</option>
                                            <option>Elettrica</option>
                                            <option>GPL</option>
                                        </select>
                                        <select className="p-3 rounded-xl text-sm" value={newCar.transmission} onChange={e => setNewCar({...newCar, transmission: e.target.value})}>
                                            <option>Automatico</option>
                                            <option>Manuale</option>
                                        </select>
                                    </div>

                                    <textarea 
                                        placeholder="Descrizione tecnica e optional..." 
                                        className="w-full p-3 rounded-xl text-sm min-h-[100px] resize-none"
                                        value={newCar.description}
                                        onChange={e => setNewCar({...newCar, description: e.target.value})}
                                    ></textarea>

                                    <button 
                                        disabled={isSubmitting}
                                        className={`w-full py-4 rounded-2xl font-bold uppercase tracking-widest text-sm transition shadow-xl text-black ${isSubmitting ? 'bg-slate-700 text-white animate-pulse' : 'bg-[#eab308] hover:bg-white'}`}
                                    >
                                        {isSubmitting ? 'Salvataggio...' : (editingId ? 'Aggiorna Annuncio' : 'Pubblica nel piazzale')}
                                    </button>
                                </div>
                            </form>
                        </div>

                        {/* Elenco auto caricate */}
                        <div className="lg:col-span-2 space-y-4">
                            <div className="flex justify-between items-end mb-2">
                                <h2 className="font-bold uppercase tracking-widest text-xs text-slate-400">Auto Online ({autoList.length})</h2>
                                <p className="text-[10px] text-[#eab308] font-bold uppercase italic">Sincronizzato con il Sito Principale</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {autoList.map(car => (
                                    <div key={car.id} className="glass p-4 rounded-3xl flex gap-4 items-center group relative overflow-hidden hover:bg-white/[0.05] transition-all border-white/5">
                                        <div className="absolute top-0 left-0">
                                            <span className={`px-2 py-0.5 rounded-br-lg text-[8px] font-black uppercase tracking-widest shadow-md ${car.category === 'Vendita' ? 'bg-[#eab308] text-black' : 'bg-black text-[#eab308] border border-[#eab308]'}`}>
                                                {car.category || 'Vendita'}
                                            </span>
                                        </div>
                                        <div className="w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0 border border-white/5 bg-slate-800">
                                            {car.images && car.images[0] && <img src={car.images[0]} className="w-full h-full object-cover" />}
                                        </div>
                                        <div className="flex-grow pt-2">
                                            <h3 className="font-bold uppercase text-sm leading-tight text-white">{car.brand} <span className="text-[#eab308]">{car.model}</span></h3>
                                            <div className="text-[10px] text-slate-400 font-bold mt-1 uppercase">
                                                {car.year} • {car.mileage} • <span className="text-white">{car.price}</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2 mt-2">
                                                {car.power && <span className="text-[8px] bg-white/10 px-1.5 py-0.5 rounded text-white font-bold uppercase">{car.power}</span>}
                                                {car.fuel && <span className="text-[8px] bg-white/10 px-1.5 py-0.5 rounded text-white font-bold uppercase">{car.fuel}</span>}
                                                {car.transmission && <span className="text-[8px] bg-white/10 px-1.5 py-0.5 rounded text-white font-bold uppercase">{car.transmission}</span>}
                                            </div>
                                        </div>
                                        
                                        <div className="flex flex-col gap-2 relative z-10">
                                            <button onClick={() => startEdit(car)} className="p-2 bg-blue-600/20 text-blue-400 rounded-lg md:opacity-0 group-hover:opacity-100 transition hover:bg-blue-600 hover:text-white">
                                                <i data-lucide="edit-3" className="w-4 h-4"></i>
                                            </button>
                                            <button onClick={() => deleteCar(car.id)} className="p-2 bg-red-600/20 text-red-400 rounded-lg md:opacity-0 group-hover:opacity-100 transition hover:bg-red-600 hover:text-white">
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                {autoList.length === 0 && (
                                    <div className="col-span-full py-12 text-center text-slate-500 text-sm">
                                        Nessun veicolo presente in archivio. Aggiungi il primo!
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
